{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header">
        <span><i class="fas fa-industry me-2" style="color:var(--blue)"></i>{{ title }}</span>
        <a href="{% url 'supplier_list' %}" class="btn-outline-vamis" style="font-size:12px;padding:5px 12px;">
          <i class="fas fa-arrow-left"></i> Back
        </a>
      </div>
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="row">
          {% for field in form %}
          <div class="{% if field.name == 'address' %}col-12{% else %}col-md-6{% endif %} mb-3">
            <label class="form-label" for="{{ field.id_for_label }}">
              {{ field.label }}{% if field.field.required %} <span style="color:var(--pink-dark)">*</span>{% endif %}
            </label>
            {{ field }}
            {% if field.errors %}<div style="color:#dc2626;font-size:12px;margin-top:4px;">{{ field.errors.0 }}</div>{% endif %}
          </div>
          {% endfor %}
          </div>
          <div class="d-flex gap-2 mt-2">
            <button type="submit" class="btn-vamis"><i class="fas fa-save"></i> Save Supplier</button>
            <a href="{% url 'supplier_list' %}" class="btn-outline-vamis">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
